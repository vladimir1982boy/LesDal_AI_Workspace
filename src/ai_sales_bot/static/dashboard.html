<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LesDal Sales Inbox</title>
  <style>
    :root {
      --bg: #f2eadf;
      --panel: #fffaf2;
      --panel-strong: #fff4e4;
      --ink: #2b231c;
      --muted: #7a6b5e;
      --accent: #2f6b52;
      --accent-soft: #d8eadf;
      --warn: #a04a2d;
      --danger: #b84d35;
      --line: #dfd0bd;
      --shadow: 0 18px 40px rgba(43, 35, 28, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(47, 107, 82, 0.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(160, 74, 45, 0.1), transparent 28%),
        var(--bg);
    }
    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      min-height: 100vh;
      gap: 18px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sidebar-header,
    .content-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
    }
    .title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .filters {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .conversation-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 360px);
      overflow: auto;
    }
    .conversation-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }
    .conversation-item:hover {
      transform: translateY(-1px);
      border-color: #c5b19a;
      background: #fff9f1;
    }
    .conversation-item.active {
      border-color: var(--accent);
      background: #f3fbf6;
    }
    .item-top, .meta-row, .owner-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .item-name {
      font-weight: 700;
      font-size: 15px;
    }
    .item-summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.channel { background: #efe5d7; color: #6f4d2f; }
    .badge.mode-ai { background: var(--accent-soft); color: var(--accent); }
    .badge.mode-manager { background: #f9dfd7; color: var(--warn); }
    .badge.stage { background: #ede7ff; color: #5f468b; }
    .badge.status-new { background: #ece4d6; color: #6a5138; }
    .badge.status-in_progress { background: #dff0e6; color: #2f6b52; }
    .badge.status-waiting_manager { background: #ffe0d6; color: var(--danger); }
    .badge.status-closed { background: #ececec; color: #666; }
    .badge.owner { background: #eef0ff; color: #46508b; }
    .attention-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(184, 77, 53, 0.14);
      flex: 0 0 auto;
    }
    .content {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 36px);
    }
    .content-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }
    .thread, .details {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      overflow: hidden;
      min-height: 0;
    }
    .thread-list {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 340px);
      overflow: auto;
    }
    .message {
      padding: 14px 16px;
      border-radius: 16px;
      max-width: 88%;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .message.customer { background: #fff0de; align-self: flex-start; }
    .message.ai { background: #eef7f1; align-self: flex-start; }
    .message.manager { background: #e8f0ff; align-self: flex-end; }
    .message.system { background: #f5f0ea; align-self: center; color: var(--muted); }
    .message-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .details-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 340px);
      overflow: auto;
    }
    .detail-block {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--line);
    }
    .detail-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .event-row {
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.35;
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 18px;
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255, 250, 242, 0.75), rgba(255, 250, 242, 1));
    }
    .actions, .status-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    textarea, input, select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 11px 13px;
      font: inherit;
      color: var(--ink);
      background: white;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      border-radius: 16px;
      padding: 14px 16px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button.primary { background: var(--accent); color: white; }
    button.secondary { background: #eadbc8; color: #5b4534; }
    button.warn { background: #d56d49; color: white; }
    button.ghost { background: #f2ece2; color: #5e5348; }
    button:disabled { opacity: 0.6; cursor: default; transform: none; }
    .status {
      font-size: 13px;
      color: var(--muted);
    }
    .empty {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }
    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; }
      .content-body { grid-template-columns: 1fr; }
      .conversation-list { max-height: 320px; }
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="sidebar-header">
        <h1 class="title">LesDal Inbox</h1>
        <p class="subtitle">Единое окно для текущих диалогов из Telegram, VK и MAX</p>
        <div class="filters">
          <input id="operatorName" placeholder="Оператор" />
          <input id="searchInput" placeholder="Поиск по имени, summary или chat id" />
          <div class="filter-grid">
            <select id="channelFilter">
              <option value="">Все каналы</option>
              <option value="telegram">Telegram</option>
              <option value="vk">VK</option>
              <option value="max">MAX</option>
            </select>
            <select id="modeFilter">
              <option value="">Все режимы</option>
              <option value="ai">AI</option>
              <option value="manager">Manager</option>
            </select>
            <select id="statusFilter">
              <option value="">Все статусы</option>
              <option value="new">new</option>
              <option value="in_progress">in_progress</option>
              <option value="waiting_manager">waiting_manager</option>
              <option value="closed">closed</option>
            </select>
            <select id="attentionFilter">
              <option value="">Любое внимание</option>
              <option value="true">Нужна реакция</option>
              <option value="false">Без тревоги</option>
            </select>
          </div>
          <div class="filter-grid">
            <input id="ownerFilter" placeholder="Фильтр по owner" />
            <button id="mineButton" class="ghost">Только мои</button>
          </div>
        </div>
      </div>
      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <main class="panel content">
      <div class="content-header">
        <h2 id="contentTitle" class="title">Диалог не выбран</h2>
        <p id="contentSubtitle" class="subtitle">Выберите разговор слева, чтобы открыть историю и взять диалог в работу.</p>
      </div>

      <div class="content-body">
        <section class="thread">
          <div id="threadList" class="thread-list">
            <div class="empty">Пока нет выбранного диалога.</div>
          </div>
        </section>

        <aside class="details">
          <div id="detailsBody" class="details-body">
            <div class="empty">Карточка лида появится после выбора диалога.</div>
          </div>
        </aside>
      </div>

      <div class="composer">
        <div class="actions">
          <button id="claimButton" class="secondary" disabled>Перехватить</button>
          <button id="releaseButton" class="ghost" disabled>Снять с себя</button>
          <button id="resumeButton" class="warn" disabled>Вернуть AI</button>
          <button id="replyButton" class="primary" disabled>Отправить ответ</button>
        </div>
        <div class="status-actions">
          <select id="statusSelect" disabled>
            <option value="new">new</option>
            <option value="in_progress">in_progress</option>
            <option value="waiting_manager">waiting_manager</option>
            <option value="closed">closed</option>
          </select>
          <button id="statusButton" class="ghost" disabled>Обновить статус</button>
        </div>
        <textarea id="replyText" placeholder="Сообщение менеджера клиенту..." disabled></textarea>
        <div id="statusLine" class="status">Dashboard готов. Список обновляется автоматически.</div>
      </div>
    </main>
  </div>

  <script>
    const authToken = new URLSearchParams(window.location.search).get("token") || "";
    const operatorStorageKey = "lesdal.operator_name";
    const state = {
      conversations: [],
      selectedId: null,
      detail: null,
      onlyMine: false,
    };

    const el = {
      list: document.getElementById("conversationList"),
      thread: document.getElementById("threadList"),
      details: document.getElementById("detailsBody"),
      title: document.getElementById("contentTitle"),
      subtitle: document.getElementById("contentSubtitle"),
      replyText: document.getElementById("replyText"),
      replyButton: document.getElementById("replyButton"),
      claimButton: document.getElementById("claimButton"),
      releaseButton: document.getElementById("releaseButton"),
      resumeButton: document.getElementById("resumeButton"),
      statusSelect: document.getElementById("statusSelect"),
      statusButton: document.getElementById("statusButton"),
      status: document.getElementById("statusLine"),
      operatorName: document.getElementById("operatorName"),
      searchInput: document.getElementById("searchInput"),
      channelFilter: document.getElementById("channelFilter"),
      modeFilter: document.getElementById("modeFilter"),
      statusFilter: document.getElementById("statusFilter"),
      attentionFilter: document.getElementById("attentionFilter"),
      ownerFilter: document.getElementById("ownerFilter"),
      mineButton: document.getElementById("mineButton"),
    };

    el.operatorName.value = localStorage.getItem(operatorStorageKey) || "Vladimir";

    function authHeaders(extra = {}) {
      return authToken ? { ...extra, Authorization: `Bearer ${authToken}` } : extra;
    }

    function currentOperator() {
      return (el.operatorName.value || "Vladimir").trim();
    }

    function effectiveOwnerFilter() {
      if (state.onlyMine) {
        return currentOperator();
      }
      return el.ownerFilter.value.trim();
    }

    function filtersQuery() {
      const params = new URLSearchParams();
      params.set("limit", "50");
      if (el.channelFilter.value) params.set("channel", el.channelFilter.value);
      if (el.modeFilter.value) params.set("mode", el.modeFilter.value);
      if (el.statusFilter.value) params.set("status", el.statusFilter.value);
      if (el.searchInput.value.trim()) params.set("q", el.searchInput.value.trim());
      if (el.attentionFilter.value) params.set("needs_attention", el.attentionFilter.value);
      const owner = effectiveOwnerFilter();
      if (owner) params.set("owner", owner);
      return params.toString();
    }

    async function apiFetch(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: authHeaders({
          "Content-Type": "application/json",
          ...(options.headers || {}),
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        const error = new Error(payload.error || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return payload;
    }

    function modeBadge(mode) {
      return `<span class="badge mode-${mode === "manager" ? "manager" : "ai"}">${escapeHtml(mode)}</span>`;
    }

    function channelBadge(channel) {
      return `<span class="badge channel">${escapeHtml(channel)}</span>`;
    }

    function stageBadge(stage) {
      return `<span class="badge stage">${escapeHtml(stage)}</span>`;
    }

    function statusBadge(status) {
      return `<span class="badge status-${escapeHtml(status)}">${escapeHtml(status)}</span>`;
    }

    function ownerBadge(owner) {
      if (!owner) return "";
      return `<span class="badge owner">${escapeHtml(owner)}</span>`;
    }

    function renderConversations() {
      el.mineButton.textContent = state.onlyMine ? "Все владельцы" : "Только мои";
      if (!state.conversations.length) {
        el.list.innerHTML = `<div class="empty">Под выбранные фильтры диалогов пока нет.</div>`;
        return;
      }
      el.list.innerHTML = state.conversations.map((item) => `
        <article class="conversation-item ${item.id === state.selectedId ? "active" : ""}" data-id="${item.id}">
          <div class="item-top">
            <div class="item-name">${escapeHtml(item.display_name || item.username || `Диалог ${item.id}`)}</div>
            <div style="display:flex; gap:8px; align-items:center;">${item.needs_attention ? '<span class="attention-dot"></span>' : ''}${channelBadge(item.channel)}</div>
          </div>
          <div class="meta-row" style="margin-top:10px; flex-wrap:wrap;">
            ${stageBadge(item.stage)}
            ${modeBadge(item.mode)}
            ${statusBadge(item.status || 'new')}
          </div>
          <div class="owner-row" style="margin-top:10px;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">${ownerBadge(item.owner_name || '')}</div>
            <div style="font-size:12px; color:var(--muted);">${escapeHtml(item.last_message_at || '')}</div>
          </div>
          <div class="item-summary">${escapeHtml(item.summary || 'Без summary, менеджер может открыть переписку и взять диалог в работу.')}</div>
        </article>
      `).join("");

      el.list.querySelectorAll(".conversation-item").forEach((node) => {
        node.addEventListener("click", () => openConversation(Number(node.dataset.id)));
      });
    }

    function eventPayload(row) {
      const payload = row.payload;
      if (!payload) return "";
      if (typeof payload === "string") {
        return payload;
      }
      if (payload.text) return payload.text;
      if (payload.status) return `status=${payload.status}`;
      if (payload.mode) return `mode=${payload.mode}`;
      return JSON.stringify(payload);
    }

    function renderThread() {
      const transcript = [...(state.detail?.transcript || [])].reverse();
      if (!transcript.length) {
        el.thread.innerHTML = `<div class="empty">В этом диалоге пока нет истории сообщений.</div>`;
        return;
      }
      el.thread.innerHTML = transcript.map((row) => `
        <div class="message ${escapeHtml(row.sender_role || 'system')}">
          <div class="message-meta">${escapeHtml(row.sender_name || row.sender_role || "unknown")} · ${escapeHtml(row.created_at || "")}</div>
          ${escapeHtml(row.text || "")}
        </div>
      `).join("");
      el.thread.scrollTop = el.thread.scrollHeight;
    }

    function renderDetails() {
      const snapshot = state.detail?.snapshot;
      const events = state.detail?.events || [];
      if (!snapshot) {
        el.details.innerHTML = `<div class="empty">Карточка лида появится после выбора диалога.</div>`;
        return;
      }
      const summary = state.detail.summary || "Пока без сводки.";
      el.details.innerHTML = `
        <div class="detail-block">
          <div class="detail-label">Клиент</div>
          <div>${escapeHtml(snapshot.display_name || "Без имени")}</div>
          <div style="color:var(--muted); margin-top:6px;">@${escapeHtml(snapshot.username || "-")}</div>
        </div>
        <div class="detail-block">
          <div class="detail-label">Workflow</div>
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;">
            ${channelBadge(snapshot.channel)}
            ${modeBadge(snapshot.mode)}
            ${statusBadge(snapshot.status || 'new')}
            ${stageBadge(snapshot.stage)}
          </div>
          <div style="font-size:13px; color:var(--muted);">Owner: ${escapeHtml(snapshot.owner_name || "-")}</div>
          <div style="font-size:13px; color:var(--muted);">Needs attention: ${snapshot.needs_attention ? 'yes' : 'no'}</div>
        </div>
        <div class="detail-block">
          <div class="detail-label">Товары</div>
          <div>${escapeHtml((snapshot.interested_products || []).join(", ") || "-")}</div>
        </div>
        <div class="detail-block">
          <div class="detail-label">Теги</div>
          <div>${escapeHtml((snapshot.tags || []).join(", ") || "-")}</div>
        </div>
        <div class="detail-block">
          <div class="detail-label">Summary</div>
          <div>${escapeHtml(summary)}</div>
        </div>
        <div class="detail-block">
          <div class="detail-label">Журнал событий</div>
          <div class="event-list">
            ${events.length ? events.map((row) => `
              <div class="event-row">
                <div><strong>${escapeHtml(row.event_type || 'event')}</strong></div>
                <div style="color:var(--muted); margin-top:4px;">${escapeHtml(row.actor || '-')} · ${escapeHtml(row.created_at || '')}</div>
                ${eventPayload(row) ? `<div style="margin-top:6px;">${escapeHtml(eventPayload(row))}</div>` : ''}
              </div>
            `).join("") : '<div style="color:var(--muted);">Событий пока нет.</div>'}
          </div>
        </div>
      `;
    }

    function renderHeader() {
      const snapshot = state.detail?.snapshot;
      if (!snapshot) {
        el.title.textContent = "Диалог не выбран";
        el.subtitle.textContent = "Выберите разговор слева, чтобы открыть историю и взять диалог в работу.";
        return;
      }
      el.title.textContent = `${snapshot.display_name || snapshot.username || `Диалог ${snapshot.conversation_id}`}`;
      el.subtitle.textContent = `[conv:${snapshot.conversation_id}] · ${snapshot.channel} · mode ${snapshot.mode} · status ${snapshot.status} · owner ${snapshot.owner_name || '-'}`;
    }

    function renderComposer() {
      const snapshot = state.detail?.snapshot;
      const enabled = Boolean(snapshot);
      const operator = currentOperator();
      const ownedByOther = Boolean(snapshot && snapshot.owner_name && snapshot.owner_name !== operator);
      const ownedByMe = Boolean(snapshot && snapshot.owner_name === operator);
      el.replyText.disabled = !enabled || ownedByOther;
      el.replyButton.disabled = !enabled || ownedByOther;
      el.claimButton.disabled = !enabled || ownedByMe;
      el.releaseButton.disabled = !enabled || !ownedByMe;
      el.resumeButton.disabled = !enabled || snapshot.mode === "ai";
      el.statusSelect.disabled = !enabled;
      el.statusButton.disabled = !enabled;
      if (snapshot) {
        el.statusSelect.value = snapshot.status || "new";
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function refreshConversations() {
      const payload = await apiFetch(`/api/conversations?${filtersQuery()}`);
      state.conversations = payload.items || [];
      renderConversations();
    }

    async function openConversation(id) {
      state.selectedId = id;
      renderConversations();
      el.status.textContent = "Открываю диалог...";
      state.detail = await apiFetch(`/api/conversations/${id}`);
      renderHeader();
      renderThread();
      renderDetails();
      renderComposer();
      el.status.textContent = `Открыт диалог [conv:${id}].`;
    }

    async function postAction(action, body = {}) {
      if (!state.selectedId) return;
      el.status.textContent = "Отправляю действие...";
      try {
        await apiFetch(`/api/conversations/${state.selectedId}/${action}`, {
          method: "POST",
          body: JSON.stringify(body),
        });
      } catch (error) {
        if (error.status === 409) {
          el.status.textContent = `Конфликт владельца: ${error.message}`;
          await openConversation(state.selectedId);
          await refreshConversations();
          return;
        }
        throw error;
      }
      await openConversation(state.selectedId);
      await refreshConversations();
      el.status.textContent = "Действие выполнено.";
    }

    async function applyFilters() {
      await refreshConversations();
      if (state.selectedId && state.conversations.some((item) => item.id === state.selectedId)) {
        await openConversation(state.selectedId);
      } else if (state.conversations.length) {
        await openConversation(state.conversations[0].id);
      } else {
        state.selectedId = null;
        state.detail = null;
        renderHeader();
        renderThread();
        renderDetails();
        renderComposer();
      }
    }

    el.operatorName.addEventListener("change", async () => {
      localStorage.setItem(operatorStorageKey, currentOperator());
      if (state.onlyMine) {
        await applyFilters();
      }
    });
    [el.searchInput, el.channelFilter, el.modeFilter, el.statusFilter, el.attentionFilter, el.ownerFilter].forEach((node) => {
      node.addEventListener("change", applyFilters);
      if (node === el.searchInput || node === el.ownerFilter) {
        node.addEventListener("keyup", async (event) => {
          if (event.key === "Enter") {
            await applyFilters();
          }
        });
      }
    });

    el.mineButton.addEventListener("click", async () => {
      state.onlyMine = !state.onlyMine;
      await applyFilters();
    });
    el.claimButton.addEventListener("click", () => postAction("claim", { operator_name: currentOperator() }));
    el.releaseButton.addEventListener("click", () => postAction("release", { operator_name: currentOperator() }));
    el.resumeButton.addEventListener("click", () => postAction("resume"));
    el.statusButton.addEventListener("click", () => postAction("status", { status: el.statusSelect.value, operator_name: currentOperator() }));
    el.replyButton.addEventListener("click", async () => {
      const text = el.replyText.value.trim();
      if (!text) {
        el.status.textContent = "Введите текст ответа менеджера.";
        return;
      }
      await postAction("reply", { text, pause_ai: true, operator_name: currentOperator() });
      el.replyText.value = "";
    });

    async function boot() {
      try {
        await applyFilters();
      } catch (error) {
        el.status.textContent = `Ошибка загрузки: ${error.message}`;
      }
    }

    setInterval(async () => {
      try {
        await refreshConversations();
        if (state.selectedId) {
          await openConversation(state.selectedId);
        }
      } catch (error) {
        el.status.textContent = `Ошибка обновления: ${error.message}`;
      }
    }, 5000);

    boot();
  </script>
</body>
</html>
