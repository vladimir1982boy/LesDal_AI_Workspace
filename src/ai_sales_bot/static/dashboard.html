<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LesDal Sales Inbox</title>
  <style>
    :root {
      --bg: #f2eadf;
      --panel: #fffaf2;
      --panel-strong: #fff4e4;
      --ink: #2b231c;
      --muted: #7a6b5e;
      --accent: #2f6b52;
      --accent-soft: #d8eadf;
      --warn: #a04a2d;
      --danger: #b84d35;
      --line: #dfd0bd;
      --shadow: 0 18px 40px rgba(43, 35, 28, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(47, 107, 82, 0.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(160, 74, 45, 0.1), transparent 28%),
        var(--bg);
    }
    .app {
      display: grid;
      grid-template-columns: minmax(560px, 58vw) minmax(0, 1fr);
      min-height: 100vh;
      gap: 18px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sidebar-header,
    .content-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
    }
    .title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .filters {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .queue-board {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
      max-height: calc(100vh - 360px);
      overflow: auto;
      align-items: start;
    }
    .queue-column {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .queue-column.waiting {
      background: linear-gradient(180deg, rgba(255, 224, 214, 0.88), rgba(255, 250, 242, 0.92));
      border-color: #e0b39e;
    }
    .queue-column.waiting.alert {
      animation: waitingPulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 0 1px rgba(184, 77, 53, 0.12), 0 0 0 8px rgba(184, 77, 53, 0.08);
    }
    .queue-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
    }
    .queue-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .queue-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .queue-column.waiting.alert .queue-note {
      color: #8a3a26;
    }
    .queue-count {
      min-width: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #efe5d7;
      color: #6f4d2f;
      text-align: center;
      font-size: 12px;
    }
    .queue-items {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .queue-empty {
      padding: 26px 16px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.4;
    }
    .archive-strip {
      grid-column: 1 / -1;
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.52);
    }
    .archive-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .archive-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .archive-card {
      min-width: 180px;
      flex: 1 1 220px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.86);
      cursor: pointer;
    }
    .archive-card.active {
      border-color: var(--accent);
      background: #f3fbf6;
    }
    .conversation-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }
    .conversation-item:hover {
      transform: translateY(-1px);
      border-color: #c5b19a;
      background: #fff9f1;
    }
    .conversation-item.active {
      border-color: var(--accent);
      background: #f3fbf6;
    }
    .item-top, .meta-row, .owner-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .item-name {
      font-weight: 700;
      font-size: 15px;
    }
    .item-summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .kpi-strip {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .kpi-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .kpi-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .kpi-label {
      color: #5f5448;
      font-weight: 700;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .card-actions button {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .mini-primary { background: var(--accent); color: white; }
    .mini-warn { background: #d56d49; color: white; }
    .mini-ghost { background: #f2ece2; color: #5e5348; }
    .mini-outline {
      background: white;
      color: #5e5348;
      border: 1px solid var(--line);
    }
    .card-lock {
      margin-top: 12px;
      padding: 9px 11px;
      border-radius: 12px;
      background: #f3eef5;
      color: #66546f;
      font-size: 12px;
      font-weight: 600;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.channel { background: #efe5d7; color: #6f4d2f; }
    .badge.mode-ai { background: var(--accent-soft); color: var(--accent); }
    .badge.mode-manager { background: #f9dfd7; color: var(--warn); }
    .badge.stage { background: #ede7ff; color: #5f468b; }
    .badge.status-new { background: #ece4d6; color: #6a5138; }
    .badge.status-in_progress { background: #dff0e6; color: #2f6b52; }
    .badge.status-waiting_manager { background: #ffe0d6; color: var(--danger); }
    .badge.status-closed { background: #ececec; color: #666; }
    .badge.owner { background: #eef0ff; color: #46508b; }
    .badge.priority-low { background: #eef1f6; color: #546173; }
    .badge.priority-normal { background: #e9efe3; color: #556247; }
    .badge.priority-high { background: #f6e7d1; color: #8a6435; }
    .badge.priority-urgent { background: #ffe0d6; color: var(--danger); }
    .badge.sla-fresh { background: #e5f3e8; color: #2f6b52; }
    .badge.sla-watch { background: #f6ecd9; color: #8a6435; }
    .badge.sla-hot { background: #ffe0d6; color: var(--danger); }
    .badge.sla-cold { background: #eef1f6; color: #546173; }
    .attention-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(184, 77, 53, 0.14);
      flex: 0 0 auto;
    }
    .content {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 36px);
    }
    .content-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }
    .thread, .details {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      overflow: hidden;
      min-height: 0;
    }
    .thread-list {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 340px);
      overflow: auto;
    }
    .message {
      padding: 14px 16px;
      border-radius: 16px;
      max-width: 88%;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .message.customer { background: #fff0de; align-self: flex-start; }
    .message.ai { background: #eef7f1; align-self: flex-start; }
    .message.manager { background: #e8f0ff; align-self: flex-end; }
    .message.system { background: #f5f0ea; align-self: center; color: var(--muted); }
    .message-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .details-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 340px);
      overflow: auto;
    }
    .detail-block {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--line);
    }
    .detail-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .event-row {
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.35;
    }
    .template-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .template-button {
      padding: 9px 11px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }
    .manager-notes {
      min-height: 118px;
      margin-top: 10px;
    }
    .crm-summary {
      min-height: 110px;
      margin-top: 10px;
    }
    .next-action {
      min-height: 84px;
      margin-top: 10px;
    }
    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 18px;
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255, 250, 242, 0.75), rgba(255, 250, 242, 1));
    }
    .actions, .status-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    textarea, input, select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 11px 13px;
      font: inherit;
      color: var(--ink);
      background: white;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      border-radius: 16px;
      padding: 14px 16px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button.primary { background: var(--accent); color: white; }
    button.secondary { background: #eadbc8; color: #5b4534; }
    button.warn { background: #d56d49; color: white; }
    button.ghost { background: #f2ece2; color: #5e5348; }
    button:disabled { opacity: 0.6; cursor: default; transform: none; }
    .status {
      font-size: 13px;
      color: var(--muted);
    }
    .status.alert {
      color: var(--danger);
      font-weight: 700;
    }
    .empty {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }
    @keyframes waitingPulse {
      0% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
      100% { transform: translateY(0); }
    }
    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; }
      .content-body { grid-template-columns: 1fr; }
      .queue-board {
        grid-template-columns: 1fr;
        max-height: 420px;
      }
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="sidebar-header">
        <h1 class="title">LesDal Inbox</h1>
        <p class="subtitle">Единое окно для текущих диалогов из Telegram, VK и MAX</p>
        <div class="filters">
          <input id="operatorName" placeholder="Оператор" />
          <input id="searchInput" placeholder="Поиск по имени, summary или chat id" />
          <div class="filter-grid">
            <select id="channelFilter">
              <option value="">Все каналы</option>
              <option value="telegram">Telegram</option>
              <option value="vk">VK</option>
              <option value="max">MAX</option>
            </select>
            <select id="modeFilter">
              <option value="">Все режимы</option>
              <option value="ai">AI</option>
              <option value="manager">Manager</option>
            </select>
            <select id="statusFilter">
              <option value="">Все статусы</option>
              <option value="new">new</option>
              <option value="in_progress">in_progress</option>
              <option value="waiting_manager">waiting_manager</option>
              <option value="closed">closed</option>
            </select>
            <select id="attentionFilter">
              <option value="">Любое внимание</option>
              <option value="true">Нужна реакция</option>
              <option value="false">Без тревоги</option>
            </select>
          </div>
          <div class="filter-grid">
            <input id="ownerFilter" placeholder="Фильтр по owner" />
            <button id="mineButton" class="ghost">Только мои</button>
          </div>
          <div class="filter-grid">
            <button id="soundToggle" class="ghost">Звук: выкл</button>
            <button id="notifyToggle" class="ghost">Браузер: выкл</button>
          </div>
        </div>
      </div>
      <div id="conversationList" class="queue-board"></div>
    </aside>

    <main class="panel content">
      <div class="content-header">
        <h2 id="contentTitle" class="title">Диалог не выбран</h2>
        <p id="contentSubtitle" class="subtitle">Выберите разговор слева, чтобы открыть историю и взять диалог в работу.</p>
      </div>

      <div class="content-body">
        <section class="thread">
          <div id="threadList" class="thread-list">
            <div class="empty">Пока нет выбранного диалога.</div>
          </div>
        </section>

        <aside class="details">
          <div id="detailsBody" class="details-body">
            <div class="empty">Карточка лида появится после выбора диалога.</div>
          </div>
        </aside>
      </div>

      <div class="composer">
        <div class="actions">
          <button id="claimButton" class="secondary" disabled>Перехватить</button>
          <button id="releaseButton" class="ghost" disabled>Снять с себя</button>
          <button id="resumeButton" class="warn" disabled>Вернуть AI</button>
          <button id="replyButton" class="primary" disabled>Отправить ответ</button>
        </div>
        <div class="status-actions">
          <select id="statusSelect" disabled>
            <option value="new">new</option>
            <option value="in_progress">in_progress</option>
            <option value="waiting_manager">waiting_manager</option>
            <option value="closed">closed</option>
          </select>
          <button id="statusButton" class="ghost" disabled>Обновить статус</button>
        </div>
        <textarea id="replyText" placeholder="Сообщение менеджера клиенту..." disabled></textarea>
        <div id="statusLine" class="status">Dashboard готов. Список обновляется автоматически.</div>
      </div>
    </main>
  </div>

  <script>
    const authToken = new URLSearchParams(window.location.search).get("token") || "";
    const operatorStorageKey = "lesdal.operator_name";
    const soundStorageKey = "lesdal.alert_sound";
    const browserNotifyStorageKey = "lesdal.browser_notify";
    const defaultTitle = document.title;
    const state = {
      conversations: [],
      selectedId: null,
      detail: null,
      onlyMine: false,
      soundEnabled: localStorage.getItem(soundStorageKey) === "true",
      browserNotifyEnabled: localStorage.getItem(browserNotifyStorageKey) === "true",
      alertingUntil: 0,
      lastWaitingIds: [],
      audioContextReady: false,
      audioContext: null,
    };

    const el = {
      list: document.getElementById("conversationList"),
      thread: document.getElementById("threadList"),
      details: document.getElementById("detailsBody"),
      title: document.getElementById("contentTitle"),
      subtitle: document.getElementById("contentSubtitle"),
      replyText: document.getElementById("replyText"),
      replyButton: document.getElementById("replyButton"),
      claimButton: document.getElementById("claimButton"),
      releaseButton: document.getElementById("releaseButton"),
      resumeButton: document.getElementById("resumeButton"),
      statusSelect: document.getElementById("statusSelect"),
      statusButton: document.getElementById("statusButton"),
      status: document.getElementById("statusLine"),
      operatorName: document.getElementById("operatorName"),
      searchInput: document.getElementById("searchInput"),
      channelFilter: document.getElementById("channelFilter"),
      modeFilter: document.getElementById("modeFilter"),
      statusFilter: document.getElementById("statusFilter"),
      attentionFilter: document.getElementById("attentionFilter"),
      ownerFilter: document.getElementById("ownerFilter"),
      mineButton: document.getElementById("mineButton"),
      soundToggle: document.getElementById("soundToggle"),
      notifyToggle: document.getElementById("notifyToggle"),
    };

    el.operatorName.value = localStorage.getItem(operatorStorageKey) || "Vladimir";
    renderAlertToggles();

    function authHeaders(extra = {}) {
      return authToken ? { ...extra, Authorization: `Bearer ${authToken}` } : extra;
    }

    function currentOperator() {
      return (el.operatorName.value || "Vladimir").trim();
    }

    function effectiveOwnerFilter() {
      if (state.onlyMine) {
        return currentOperator();
      }
      return el.ownerFilter.value.trim();
    }

    function filtersQuery() {
      const params = new URLSearchParams();
      params.set("limit", "50");
      if (el.channelFilter.value) params.set("channel", el.channelFilter.value);
      if (el.modeFilter.value) params.set("mode", el.modeFilter.value);
      if (el.statusFilter.value) params.set("status", el.statusFilter.value);
      if (el.searchInput.value.trim()) params.set("q", el.searchInput.value.trim());
      if (el.attentionFilter.value) params.set("needs_attention", el.attentionFilter.value);
      const owner = effectiveOwnerFilter();
      if (owner) params.set("owner", owner);
      return params.toString();
    }

    async function apiFetch(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: authHeaders({
          "Content-Type": "application/json",
          ...(options.headers || {}),
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        const error = new Error(payload.error || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return payload;
    }

    function modeBadge(mode) {
      return `<span class="badge mode-${mode === "manager" ? "manager" : "ai"}">${escapeHtml(mode)}</span>`;
    }

    function channelBadge(channel) {
      return `<span class="badge channel">${escapeHtml(channel)}</span>`;
    }

    function stageBadge(stage) {
      return `<span class="badge stage">${escapeHtml(stage)}</span>`;
    }

    function statusBadge(status) {
      return `<span class="badge status-${escapeHtml(status)}">${escapeHtml(status)}</span>`;
    }

    function ownerBadge(owner) {
      if (!owner) return "";
      return `<span class="badge owner">${escapeHtml(owner)}</span>`;
    }

    function priorityBadge(priority) {
      const normalized = String(priority || "normal");
      return `<span class="badge priority-${escapeHtml(normalized)}">${escapeHtml(normalized)}</span>`;
    }

    function parseIso(value) {
      if (!value) {
        return null;
      }
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function elapsedMinutes(value) {
      const date = parseIso(value);
      if (!date) {
        return null;
      }
      return Math.max(0, Math.floor((Date.now() - date.getTime()) / 60000));
    }

    function humanElapsed(minutes) {
      if (minutes === null) {
        return "без отметки";
      }
      if (minutes < 1) {
        return "только что";
      }
      if (minutes < 60) {
        return `${minutes} мин`;
      }
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      if (hours < 24) {
        return rest ? `${hours} ч ${rest} мин` : `${hours} ч`;
      }
      const days = Math.floor(hours / 24);
      const remHours = hours % 24;
      return remHours ? `${days} д ${remHours} ч` : `${days} д`;
    }

    function slaSnapshot(item) {
      const waitingAt = item.last_customer_message_at || item.last_message_at;
      const managerAt = item.last_manager_message_at || item.last_message_at;
      const source = item.status === "waiting_manager" ? waitingAt : managerAt;
      const minutes = elapsedMinutes(source);
      if (item.status === "waiting_manager") {
        if (minutes === null) {
          return { level: "watch", label: "Ждёт ответа", age: "без времени", score: 45 };
        }
        if (minutes >= 30) {
          return { level: "hot", label: "Просрочено", age: humanElapsed(minutes), score: 300 + minutes };
        }
        if (minutes >= 10) {
          return { level: "watch", label: "Скоро SLA", age: humanElapsed(minutes), score: 200 + minutes };
        }
        return { level: "fresh", label: "Свежий запрос", age: humanElapsed(minutes), score: 100 + minutes };
      }
      if (item.status === "in_progress") {
        if (minutes === null) {
          return { level: "cold", label: "В работе", age: "без времени", score: 20 };
        }
        if (minutes >= 120) {
          return { level: "watch", label: "Давно без ответа", age: humanElapsed(minutes), score: 80 + minutes };
        }
        return { level: "cold", label: "В работе", age: humanElapsed(minutes), score: minutes };
      }
      if (item.status === "new") {
        const freshMinutes = elapsedMinutes(item.last_customer_message_at || item.last_message_at);
        if (freshMinutes === null) {
          return { level: "cold", label: "Новый диалог", age: "без времени", score: 10 };
        }
        if (freshMinutes >= 20) {
          return { level: "watch", label: "Новый без разбора", age: humanElapsed(freshMinutes), score: 60 + freshMinutes };
        }
        return { level: "fresh", label: "Новый диалог", age: humanElapsed(freshMinutes), score: 30 + freshMinutes };
      }
      return { level: "cold", label: "Архив", age: humanElapsed(elapsedMinutes(item.last_message_at)), score: 0 };
    }

    function followUpSnapshot(item) {
      const raw = String(item.follow_up_date || "").trim();
      if (!raw) {
        return { label: "follow-up не задан", level: "cold" };
      }
      const date = parseIso(raw);
      if (!date) {
        return { label: `follow-up: ${raw}`, level: "watch" };
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(date);
      due.setHours(0, 0, 0, 0);
      const diffDays = Math.round((due.getTime() - today.getTime()) / 86400000);
      if (diffDays < 0) {
        return { label: `просрочен на ${Math.abs(diffDays)} д`, level: "hot" };
      }
      if (diffDays === 0) {
        return { label: "сегодня", level: "watch" };
      }
      if (diffDays === 1) {
        return { label: "завтра", level: "fresh" };
      }
      return { label: raw, level: "cold" };
    }

    function shortenText(value, maxLength = 64) {
      const text = String(value || "").trim();
      if (!text) {
        return "";
      }
      if (text.length <= maxLength) {
        return text;
      }
      return `${text.slice(0, maxLength - 1)}…`;
    }

    function queueLabel(status) {
      if (status === "new") return "Новые";
      if (status === "in_progress") return "В работе";
      if (status === "waiting_manager") return "Ждут менеджера";
      return status;
    }

    function queueNote(status) {
      if (status === "new") return "Первичный входящий поток, который ещё не закреплён за оператором.";
      if (status === "in_progress") return "Диалоги уже в работе: у AI или у закреплённого менеджера.";
      if (status === "waiting_manager") return "Клиент ждёт ответ человека. Это приоритетная очередь.";
      return "";
    }

    function browserNotifyAvailable() {
      return typeof window !== "undefined" && "Notification" in window;
    }

    function notificationStateLabel() {
      if (!browserNotifyAvailable()) {
        return "Браузер: недоступен";
      }
      if (Notification.permission === "granted" && state.browserNotifyEnabled) {
        return "Браузер: вкл";
      }
      if (Notification.permission === "denied") {
        return "Браузер: запрещён";
      }
      return state.browserNotifyEnabled ? "Браузер: ждёт доступ" : "Браузер: выкл";
    }

    function renderAlertToggles() {
      el.soundToggle.textContent = state.soundEnabled ? "Звук: вкл" : "Звук: выкл";
      el.notifyToggle.textContent = notificationStateLabel();
      el.notifyToggle.disabled = !browserNotifyAvailable() || Notification.permission === "denied";
    }

    async function ensureAudioContext() {
      if (state.audioContextReady) {
        return state.audioContext;
      }
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) {
        return null;
      }
      state.audioContext = state.audioContext || new AudioCtor();
      if (state.audioContext.state === "suspended") {
        try {
          await state.audioContext.resume();
        } catch (error) {
          return null;
        }
      }
      state.audioContextReady = state.audioContext.state === "running";
      return state.audioContextReady ? state.audioContext : null;
    }

    async function playAlertSound() {
      if (!state.soundEnabled) {
        return;
      }
      const context = await ensureAudioContext();
      if (!context) {
        return;
      }
      const now = context.currentTime;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(740, now);
      oscillator.frequency.exponentialRampToValueAtTime(520, now + 0.18);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + 0.24);
    }

    async function triggerBrowserNotification(items) {
      if (!state.browserNotifyEnabled || !browserNotifyAvailable()) {
        return;
      }
      if (Notification.permission !== "granted") {
        return;
      }
      const lead = items[0];
      const title = items.length === 1
        ? `Нужен ответ: ${lead.display_name || lead.username || `Диалог ${lead.id}`}`
        : `Новых диалогов для менеджера: ${items.length}`;
      const body = items.length === 1
        ? `${lead.channel} · ${lead.summary || "Откройте карточку и ответьте клиенту."}`
        : "Очередь waiting_manager пополнилась. Откройте доску оператора.";
      const notification = new Notification(title, {
        body,
        tag: "lesdal-waiting-manager",
      });
      notification.onclick = () => {
        window.focus();
      };
    }

    function updateDocumentTitle() {
      const waitingCount = state.conversations.filter((item) => item.status === "waiting_manager").length;
      document.title = waitingCount ? `(${waitingCount}) ${defaultTitle}` : defaultTitle;
    }

    async function handleQueueAlerts(previousItems, nextItems) {
      const previousWaiting = new Map(
        previousItems
          .filter((item) => item.status === "waiting_manager")
          .map((item) => [item.id, item])
      );
      const nextWaiting = nextItems.filter((item) => item.status === "waiting_manager");
      const newAlerts = nextWaiting.filter((item) => !previousWaiting.has(item.id));
      state.lastWaitingIds = nextWaiting.map((item) => item.id);
      updateDocumentTitle();
      if (!previousItems.length) {
        return;
      }
      if (!newAlerts.length) {
        if (state.alertingUntil <= Date.now()) {
          el.status.classList.remove("alert");
        }
        return;
      }
      state.alertingUntil = Date.now() + 25000;
      el.status.textContent = `Новые диалоги ждут менеджера: ${newAlerts.length}.`;
      el.status.classList.add("alert");
      await playAlertSound();
      await triggerBrowserNotification(newAlerts);
      renderConversations();
    }

    function cardActions(item, compact = false) {
      if (compact) {
        return "";
      }
      const operator = currentOperator();
      const owner = String(item.owner_name || "").trim();
      const ownedByMe = owner && owner === operator;
      const ownedByOther = owner && owner !== operator;
      const actions = [];
      if (ownedByOther) {
        return `<div class="card-lock">Закреплено за ${escapeHtml(owner)}</div>`;
      }
      if (!ownedByMe && item.status !== "closed") {
        actions.push(`<button class="mini-primary quick-action" data-id="${item.id}" data-action="claim">Перехватить</button>`);
      }
      if (ownedByMe) {
        actions.push(`<button class="mini-ghost quick-action" data-id="${item.id}" data-action="release">Снять</button>`);
      }
      if (item.mode === "manager" && !ownedByOther) {
        actions.push(`<button class="mini-warn quick-action" data-id="${item.id}" data-action="resume">Вернуть AI</button>`);
      }
      if (item.status !== "closed" && !ownedByOther) {
        actions.push(`<button class="mini-outline quick-action" data-id="${item.id}" data-action="close">Закрыть</button>`);
      }
      if (item.status === "closed" && !ownedByOther) {
        actions.push(`<button class="mini-outline quick-action" data-id="${item.id}" data-action="reopen">Переоткрыть</button>`);
      }
      if (!actions.length) {
        return "";
      }
      return `<div class="card-actions">${actions.join("")}</div>`;
    }

    function conversationCard(item, compact = false) {
      const summary = item.summary || "Без summary, менеджер может открыть переписку и взять диалог в работу.";
      const rootClass = compact ? "archive-card" : `conversation-item ${item.id === state.selectedId ? "active" : ""}`;
      const activeClass = compact && item.id === state.selectedId ? "active" : "";
      const sla = slaSnapshot(item);
      const followUp = followUpSnapshot(item);
      const nextAction = shortenText(item.next_action || "", compact ? 52 : 68);
      return `
        <article class="${rootClass}${activeClass ? ` ${activeClass}` : ""}" data-id="${item.id}">
          <div class="item-top">
            <div class="item-name">${escapeHtml(item.display_name || item.username || `Диалог ${item.id}`)}</div>
            <div style="display:flex; gap:8px; align-items:center;">${item.needs_attention ? '<span class="attention-dot"></span>' : ''}${channelBadge(item.channel)}</div>
          </div>
          <div class="meta-row" style="margin-top:10px; flex-wrap:wrap;">
            ${stageBadge(item.stage)}
            ${modeBadge(item.mode)}
            ${statusBadge(item.status || "new")}
          </div>
          <div class="owner-row" style="margin-top:10px;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
              ${ownerBadge(item.owner_name || "")}
              ${priorityBadge(item.priority || "normal")}
              <span class="badge sla-${sla.level}">${escapeHtml(sla.label)}</span>
            </div>
            <div style="font-size:12px; color:var(--muted);">${escapeHtml(item.last_message_at || "")}</div>
          </div>
          <div style="margin-top:8px; font-size:12px; color:var(--muted);">Ожидание: ${escapeHtml(sla.age)}</div>
          <div class="item-summary">${escapeHtml(summary)}</div>
          <div class="kpi-strip">
            <div class="kpi-row">
              <span class="kpi-label">Follow-up:</span>
              <span class="badge sla-${followUp.level}">${escapeHtml(followUp.label)}</span>
            </div>
            <div class="kpi-text">
              <span class="kpi-label">Next:</span>
              ${escapeHtml(nextAction || "не задано")}
            </div>
          </div>
          ${cardActions(item, compact)}
        </article>
      `;
    }

    function queueColumn(status, items) {
      const waitingClass = status === "waiting_manager" ? " waiting" : "";
      const alertClass = status === "waiting_manager" && state.alertingUntil > Date.now() && items.length ? " alert" : "";
      return `
        <section class="queue-column${waitingClass}${alertClass}">
          <div class="queue-header">
            <div class="queue-title">
              <span>${queueLabel(status)}</span>
              <span class="queue-count">${items.length}</span>
            </div>
            <div class="queue-note">${queueNote(status)}</div>
          </div>
          <div class="queue-items">
            ${items.length ? items.map((item) => conversationCard(item)).join("") : `<div class="queue-empty">В этой очереди пока пусто.</div>`}
          </div>
        </section>
      `;
    }

    function renderConversations() {
      el.mineButton.textContent = state.onlyMine ? "Все владельцы" : "Только мои";
      if (!state.conversations.length) {
        el.list.innerHTML = `<div class="empty">Под выбранные фильтры диалогов пока нет.</div>`;
        return;
      }
      const grouped = {
        new: [],
        in_progress: [],
        waiting_manager: [],
        closed: [],
      };
      state.conversations.forEach((item) => {
        const status = item.status || "new";
        if (grouped[status]) {
          grouped[status].push(item);
          return;
        }
        grouped.new.push(item);
      });
      Object.values(grouped).forEach((items) => {
        items.sort((left, right) => slaSnapshot(right).score - slaSnapshot(left).score);
      });
      el.list.innerHTML = `
        ${queueColumn("new", grouped.new)}
        ${queueColumn("in_progress", grouped.in_progress)}
        ${queueColumn("waiting_manager", grouped.waiting_manager)}
        ${grouped.closed.length ? `
          <section class="archive-strip">
            <div class="archive-head">
              <strong>Завершённые</strong>
              <span class="queue-count">${grouped.closed.length}</span>
            </div>
            <div class="archive-list">
              ${grouped.closed.map((item) => conversationCard(item, true)).join("")}
            </div>
          </section>
        ` : ""}
      `;

      el.list.querySelectorAll(".conversation-item, .archive-card").forEach((node) => {
        node.addEventListener("click", () => openConversation(Number(node.dataset.id)));
      });
      el.list.querySelectorAll(".quick-action").forEach((node) => {
        node.addEventListener("click", async (event) => {
          event.stopPropagation();
          await handleQuickAction(node.dataset.action, Number(node.dataset.id));
        });
      });
    }

    function eventPayload(row) {
      const payload = row.payload;
      if (!payload) return "";
      if (typeof payload === "string") {
        return payload;
      }
      if (payload.text) return payload.text;
      if (payload.status) return `status=${payload.status}`;
      if (payload.mode) return `mode=${payload.mode}`;
      return JSON.stringify(payload);
    }

    function renderThread() {
      const transcript = [...(state.detail?.transcript || [])].reverse();
      if (!transcript.length) {
        el.thread.innerHTML = `<div class="empty">В этом диалоге пока нет истории сообщений.</div>`;
        return;
      }
      el.thread.innerHTML = transcript.map((row) => `
        <div class="message ${escapeHtml(row.sender_role || 'system')}">
          <div class="message-meta">${escapeHtml(row.sender_name || row.sender_role || "unknown")} · ${escapeHtml(row.created_at || "")}</div>
          ${escapeHtml(row.text || "")}
        </div>
      `).join("");
      el.thread.scrollTop = el.thread.scrollHeight;
    }

    function renderComposer() {
      const snapshot = state.detail?.snapshot;
      const enabled = Boolean(snapshot);
      const operator = currentOperator();
      const ownedByOther = Boolean(snapshot && snapshot.owner_name && snapshot.owner_name !== operator);
      const ownedByMe = Boolean(snapshot && snapshot.owner_name === operator);
      el.replyText.disabled = !enabled || ownedByOther;
      el.replyButton.disabled = !enabled || ownedByOther;
      el.claimButton.disabled = !enabled || ownedByMe;
      el.releaseButton.disabled = !enabled || !ownedByMe;
      el.resumeButton.disabled = !enabled || snapshot.mode === "ai";
      el.statusSelect.disabled = !enabled;
      el.statusButton.disabled = !enabled;
      if (snapshot) {
        el.statusSelect.value = snapshot.status || "new";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value)
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function refreshConversations() {
      const previous = state.conversations.slice();
      const payload = await apiFetch(`/api/conversations?${filtersQuery()}`);
      state.conversations = payload.items || [];
      await handleQueueAlerts(previous, state.conversations);
      renderConversations();
    }

    async function openConversation(id) {
      state.selectedId = id;
      renderConversations();
      el.status.textContent = "Открываю диалог...";
      el.status.classList.remove("alert");
      state.detail = await apiFetch(`/api/conversations/${id}`);
      renderHeader();
      renderThread();
      renderDetails();
      renderComposer();
      el.status.textContent = `Открыт диалог [conv:${id}].`;
      el.status.classList.remove("alert");
    }

    async function postConversationAction(conversationId, action, body = {}) {
      el.status.textContent = "Отправляю действие...";
      el.status.classList.remove("alert");
      try {
        await apiFetch(`/api/conversations/${conversationId}/${action}`, {
          method: "POST",
          body: JSON.stringify(body),
        });
      } catch (error) {
        if (error.status === 409) {
          el.status.textContent = `Конфликт владельца: ${error.message}`;
          if (state.selectedId) {
            await openConversation(state.selectedId);
          }
          await refreshConversations();
          return false;
        }
        throw error;
      }
      await refreshConversations();
      await openConversation(conversationId);
      el.status.textContent = "Действие выполнено.";
      el.status.classList.remove("alert");
      return true;
    }

    async function postAction(action, body = {}) {
      if (!state.selectedId) return;
      await postConversationAction(state.selectedId, action, body);
    }

    async function handleQuickAction(action, conversationId) {
      if (!conversationId) {
        return;
      }
      if (action === "claim") {
        await postConversationAction(conversationId, "claim", { operator_name: currentOperator() });
        return;
      }
      if (action === "release") {
        await postConversationAction(conversationId, "release", { operator_name: currentOperator() });
        return;
      }
      if (action === "resume") {
        await postConversationAction(conversationId, "resume");
        return;
      }
      if (action === "close") {
        await postConversationAction(conversationId, "status", { status: "closed", operator_name: currentOperator() });
        return;
      }
      if (action === "reopen") {
        await postConversationAction(conversationId, "status", { status: "new", operator_name: currentOperator() });
      }
    }

    async function applyFilters() {
      await refreshConversations();
      if (state.selectedId && state.conversations.some((item) => item.id === state.selectedId)) {
        await openConversation(state.selectedId);
      } else if (state.conversations.length) {
        await openConversation(state.conversations[0].id);
      } else {
        state.selectedId = null;
        state.detail = null;
        renderHeader();
        renderThread();
        renderDetails();
        renderComposer();
      }
    }

    el.operatorName.addEventListener("change", async () => {
      localStorage.setItem(operatorStorageKey, currentOperator());
      if (state.onlyMine) {
        await applyFilters();
      }
    });
    el.soundToggle.addEventListener("click", async () => {
      state.soundEnabled = !state.soundEnabled;
      localStorage.setItem(soundStorageKey, String(state.soundEnabled));
      renderAlertToggles();
      if (state.soundEnabled) {
        await ensureAudioContext();
      }
    });
    el.notifyToggle.addEventListener("click", async () => {
      if (!browserNotifyAvailable()) {
        return;
      }
      if (Notification.permission === "default") {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          state.browserNotifyEnabled = false;
          localStorage.setItem(browserNotifyStorageKey, "false");
          renderAlertToggles();
          return;
        }
      }
      state.browserNotifyEnabled = !state.browserNotifyEnabled;
      localStorage.setItem(browserNotifyStorageKey, String(state.browserNotifyEnabled));
      renderAlertToggles();
    });
    [el.searchInput, el.channelFilter, el.modeFilter, el.statusFilter, el.attentionFilter, el.ownerFilter].forEach((node) => {
      node.addEventListener("change", applyFilters);
      if (node === el.searchInput || node === el.ownerFilter) {
        node.addEventListener("keyup", async (event) => {
          if (event.key === "Enter") {
            await applyFilters();
          }
        });
      }
    });

    el.mineButton.addEventListener("click", async () => {
      state.onlyMine = !state.onlyMine;
      await applyFilters();
    });
    el.claimButton.addEventListener("click", () => postAction("claim", { operator_name: currentOperator() }));
    el.releaseButton.addEventListener("click", () => postAction("release", { operator_name: currentOperator() }));
    el.resumeButton.addEventListener("click", () => postAction("resume"));
    el.statusButton.addEventListener("click", () => postAction("status", { status: el.statusSelect.value, operator_name: currentOperator() }));
    el.replyButton.addEventListener("click", async () => {
      const text = el.replyText.value.trim();
      if (!text) {
        el.status.textContent = "Введите текст ответа менеджера.";
        return;
      }
      await postAction("reply", { text, pause_ai: true, operator_name: currentOperator() });
      el.replyText.value = "";
    });

    async function boot() {
      try {
        await ensureAudioContext();
        await applyFilters();
      } catch (error) {
        el.status.textContent = `Ошибка загрузки: ${error.message}`;
        el.status.classList.add("alert");
      }
    }

    setInterval(async () => {
      try {
        await refreshConversations();
        if (state.selectedId) {
          await openConversation(state.selectedId);
        }
      } catch (error) {
        el.status.textContent = `Ошибка обновления: ${error.message}`;
        el.status.classList.add("alert");
      }
    }, 5000);

    boot();
  </script>
</body>
</html>
